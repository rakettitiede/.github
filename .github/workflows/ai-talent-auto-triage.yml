name: '🏷️ — AI Talent auto triage'

on:
  workflow_call:
    secrets:
      ORG_PROJECT_PAT:
        required: true

jobs:
  triage:
    name: '🏷️ — Assign and label'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: 'Auto-assign author'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        with:
          script: |
            const number = context.payload.issue?.number
              ?? context.payload.pull_request?.number;
            if (!number) return;
            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: number,
              assignees: [context.actor],
            });

      - name: 'Auto-label from PR description'
        if: github.event_name == 'pull_request' || github.event.pull_request != null
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        with:
          script: |
            const body = context.payload.pull_request?.body ?? '';
            const match = body.match(/\|\s*Label\s*\|\s*(bug|enhancement|refactor|docs|infra|chore)\s*\|/i);
            if (!match) return;
            const label = match[1].toLowerCase();
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              labels: [label],
            });

  project-fields:
    name: '📋 — Populate project fields'
    runs-on: ubuntu-latest
    needs: triage
    permissions: {}

    steps:
      - name: 'Add to project and set fields'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        with:
          github-token: ${{ secrets.ORG_PROJECT_PAT }}
          script: |
            const projectId = 'PVT_kwDOAJbFRc4BQpOk';
            const nodeId = context.payload.pull_request?.node_id
              ?? context.payload.issue?.node_id;
            if (!nodeId) return;

            // Add to project
            const { addProjectV2ItemById: { item } } = await github.graphql(`
              mutation($projectId: ID!, $contentId: ID!) {
                addProjectV2ItemById(input: { projectId: $projectId, contentId: $contentId }) {
                  item { id }
                }
              }`, { projectId, contentId: nodeId });
            const itemId = item.id;

            const today = new Date().toISOString().split('T')[0];
            const body = context.payload.pull_request?.body ?? context.payload.issue?.body ?? '';

            // Parse Priority and Size from PR description table
            const priorityMatch = body.match(/\|\s*Priority\s*\|\s*(P[012])\s*\|/i);
            const sizeMatch = body.match(/\|\s*Size\s*\|\s*(XS|S|M|L|XL)\s*\|/i);

            const priorityOptionMap = { P0: '79628723', P1: '0a877460', P2: 'da944a9c' };
            const sizeOptionMap = { XS: '6c6483d2', S: 'f784b110', M: '7515a9f1', L: '817d0097', XL: 'db339eb2' };

            const setField = (fieldId, value) => github.graphql(`
              mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $value: ProjectV2FieldValue!) {
                updateProjectV2ItemFieldValue(input: {
                  projectId: $projectId, itemId: $itemId, fieldId: $fieldId, value: $value
                }) { projectV2Item { id } }
              }`, { projectId, itemId, fieldId, value });

            // Always set: Estimate=1, Start date=today, Target date=today, Sprint=Sprint 5
            await setField('PVTF_lADOAJbFRc4BQpOkzg-tENY', { number: 1 });
            await setField('PVTF_lADOAJbFRc4BQpOkzg-tENc', { date: today });
            await setField('PVTF_lADOAJbFRc4BQpOkzg-tENg', { date: today });
            await setField('PVTIF_lADOAJbFRc4BQpOkzg_v0m8', { iterationId: '01aca77b' });

            // Conditionally set Priority if found in PR body
            if (priorityMatch) {
              const optionId = priorityOptionMap[priorityMatch[1].toUpperCase()];
              if (optionId) await setField('PVTSSF_lADOAJbFRc4BQpOkzg-tENQ', { singleSelectOptionId: optionId });
            }

            // Conditionally set Size if found in PR body
            if (sizeMatch) {
              const optionId = sizeOptionMap[sizeMatch[1].toUpperCase()];
              if (optionId) await setField('PVTSSF_lADOAJbFRc4BQpOkzg-tENU', { singleSelectOptionId: optionId });
            }

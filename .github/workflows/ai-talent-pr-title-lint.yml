name: '🏷️ — AI Talent PR title lint'

on:
  workflow_call: {}

jobs:
  lint:
    name: '🏷️ — Validate PR title'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      statuses: write
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            refactor
            test
            chore
            ci
            build
            perf
            style
          requireScope: false
